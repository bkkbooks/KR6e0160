body:
  text: 杜順法師作若人欲識真空理身內真如還遍外情與非情共一體處處皆同真法界不離幻色即見空即此真如含一切一念照入於多劫一一念劫收一切於一境內一切智於一智中諸境界秖用一念觀諸境一切諸境同時會時處帝網現重重一切智通無𦊱㝵第一句真空不動智凡聖本來同雖為万有體曾無起作功第二句真如無作性亘等虛空豈如浮漚質出沒在海中第三句無情無自性性體發於真頓現如鏡像誰作自他身第四句智現情無㝵心通事豈妨事理融無二何處非道場第五六句幻性本無宗根塵結色空了塵無自性一切法皆同第七句絶念超情識如鏡照十方万像斯頓現那假在思量第八句譬如一鏡鑒十方十方一一鏡皆同無㝵心鏡照古今九世重重相容第九句心為万法宗万法一心通毛端一滴海一切海皆同第十句一一万法體同空一一虛空相容一海魚龍尚無盡一切海中多少龍第十一十二句三際無思理等空空中何法不含容一智万差融事理塵塵剎剎普皆同第十三十四句寂用繫興帝網宗一塵才舉十方通六相十玄融斯理主伴交映重重通頌前文又讚曰尊從悲智起文殊海一漚片言通帝網漩澓顯深幽一心圓頓備十重万行周無邊花藏界攝在一毛頭
